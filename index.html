<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CAZySearch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #f8f9fa; color: #1a1a1a; font-family: 'DM Sans', system-ui, sans-serif; }
    input, button, select { font-family: inherit; }
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f4f5f7;
      --color-background-tertiary: #f8f9fa;
      --color-background-danger: #fff0f0;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #555;
      --color-text-tertiary: #999;
      --color-text-danger: #c0392b;
      --color-text-info: #185FA5;
      --color-border-tertiary: rgba(0,0,0,0.1);
      --color-border-secondary: rgba(0,0,0,0.18);
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
